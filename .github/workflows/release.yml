name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_only:
        description: 'Skip release-please and run publish directly (use after a failed publish)'
        type: boolean
        default: false

# Write access is needed for release-please to create/update release PRs and
# tags. Pull-requests write is needed to open the release PR itself.
permissions:
  contents: write
  pull-requests: write

# Never cancel a release in progress — interrupting mid-publish can leave the
# registry in a partially-published state. This is intentionally different from
# the CI workflow, which does cancel in-progress runs.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: ${{ !inputs.publish_only }}
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: [release-please]
    if: |
      always() && (
        needs.release-please.outputs.releases_created == 'true' ||
        inputs.publish_only == true
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # pnpm must be set up before setup-node so that the node cache key works.
      # Version must match the version used in ci.yml to keep the toolchain consistent.
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '20'
          # No registry-url here — setup-node would set NPM_CONFIG_USERCONFIG to
          # a temp file containing the literal string "${NODE_AUTH_TOKEN}" which
          # pnpm does not expand, causing 401/404. We write the token ourselves.
          cache: 'pnpm'

      # Write the real token value (not a variable reference) directly to
      # ~/.npmrc. Because NPM_CONFIG_USERCONFIG is not set, pnpm finds this file
      # via the standard npm config resolution order.
      - name: Configure npm auth
        run: echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" >> ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm install --frozen-lockfile

      # Build in dependency order: core must be built before cli, because cli
      # imports from dc2mermaid-core at its workspace path.
      - run: pnpm --filter dc2mermaid-core build
      - run: pnpm --filter docker-compose-to-mermaid build

      # --no-git-checks skips the "is the working tree clean / is this a tagged
      # commit" guard that pnpm publish normally enforces. In CI the checkout is
      # a detached HEAD on the merge commit, not a tag, so the guard would always
      # fail. Release-please already ensures we are only here when a proper
      # release tag was created.
      - run: pnpm --filter dc2mermaid-core publish --access public --no-git-checks

      - run: pnpm --filter docker-compose-to-mermaid publish --access public --no-git-checks

      # Build and publish the VSCode extension.
      # Requires a VSCE_PAT secret: generate at https://dev.azure.com → User Settings
      # → Personal access tokens → New Token → Marketplace (Manage) scope.
      - run: pnpm --filter dc2mermaid-vscode build
      - run: pnpm exec vsce publish --packagePath packages/vscode --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

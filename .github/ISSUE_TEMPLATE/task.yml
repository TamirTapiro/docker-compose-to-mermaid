name: Task
description: Implementation task for docker-compose-to-mermaid
title: "[CATEGORY] "
labels: []
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P0 — Critical (MVP blocker)"
        - "P1 — High (MVP feature)"
        - "P2 — Medium (v1.0 feature)"
        - "P3 — Low (future / nice-to-have)"
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - chore
        - core
        - parser
        - inference
        - renderer
        - cli
        - config
        - testing
        - devops
        - github-action
        - docs
        - vscode
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be implemented? Include context from the relevant design doc.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: Checklist of conditions that must be true for this issue to be closed.
      placeholder: |
        - [ ] ...
        - [ ] ...

  - type: input
    id: blocked-by
    attributes:
      label: Blocked By
      description: Issue numbers this task is blocked by (e.g., #1, #3)
      placeholder: "#1, #3"

  - type: input
    id: performing-agent
    attributes:
      label: Performing Agent
      description: Which agent/role should implement this
      placeholder: "backend-engineer | devops-engineer | technical-writer"
    validations:
      required: true
